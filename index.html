<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNAPTICS 2K26 | ECE JNTUH UCES</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --bg-ultra: #020205;
            --accent: #00e5ff;
            --accent-rgb: 0, 229, 255;
            --text-high: #ffffff;
            --text-mid: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.03);
            --curve: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-ultra);
            color: var(--text-high);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 1. HIGH-PERFORMANCE CURSOR CANVAS */
        #cursor-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 10000;
        }

        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; opacity: 0.4;
        }

        /* 2. NAVIGATION */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 6%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 2, 5, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 1000;
        }
        .nav-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 900; letter-spacing: 3px; color: #fff; text-decoration: none; font-size: 1.2rem; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-mid); text-decoration: none; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        /* 3. HERO */
        #home {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #0a182b 0%, var(--bg-ultra) 100%); text-align: center;
        }
        .fest-logo { width: 85%; max-width: 550px; filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.2)); animation: float 6s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* 4. METRICS (Reference Style) */
        .section { padding: 100px 8%; max-width: 1400px; margin: 0 auto; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 50px 0; }
        .metric-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 20px;
            padding: 40px 20px; text-align: center; transition: 0.4s var(--curve);
        }
        .metric-card:hover { border-color: var(--accent); transform: translateY(-10px); background: rgba(var(--accent-rgb), 0.05); }
        .metric-num { font-size: 2.5rem; font-weight: 900; font-family: 'Space Grotesk'; display: block; color: #fff; }
        .metric-label { font-size: 0.7rem; color: var(--text-mid); text-transform: uppercase; letter-spacing: 2px; }

        /* 5. AUTO-FIT MASONRY GALLERY */
        .gallery-wrapper {
            column-count: 3;
            column-gap: 20px;
            width: 100%;
        }
        
        .media-box {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--border);
            position: relative;
            transition: 0.5s var(--curve);
        }

        .media-box img, .media-box video {
            width: 100%;
            display: block;
            opacity: 0.75;
            transition: 0.5s var(--curve);
        }

        .media-box:hover { border-color: var(--accent); transform: scale(1.02); z-index: 10; }
        .media-box:hover img, .media-box:hover video { opacity: 1; }

        /* Video Play Overlay */
        .vid-indicator {
            position: absolute; top: 15px; right: 15px;
            background: rgba(var(--accent-rgb), 0.2);
            padding: 5px 12px; border-radius: 20px; border: 1px solid var(--accent);
            color: var(--accent); font-size: 0.6rem; font-weight: 900;
            pointer-events: none; text-transform: uppercase;
        }

        /* 6. REVEAL */
        .reveal { opacity: 0; transform: translateY(40px); transition: 1.2s var(--curve); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        footer { background: #000; border-top: 1px solid var(--border); padding: 80px 8% 40px; margin-top: 100px; }
        .status-pill { display: inline-flex; align-items: center; padding: 10px 20px; border: 1px solid rgba(255, 62, 62, 0.3); border-radius: 8px; color: #ff3e3e; font-size: 0.75rem; font-weight: 700; }
        .dot { width: 8px; height: 8px; background: #ff3e3e; border-radius: 50%; margin-right: 12px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        @media (max-width: 900px) { .gallery-wrapper { column-count: 2; } }
        @media (max-width: 600px) { .gallery-wrapper { column-count: 1; } }
    </style>
</head>
<body>

    <canvas id="cursor-canvas"></canvas>
    <canvas id="bg-canvas"></canvas>

    <nav>
        <a href="#home" class="nav-logo">SYNAPTICS <span style="color:var(--accent)">2K26</span></a>
        <div class="nav-links">
            <a href="#home">Initiate</a>
            <a href="#metrics">Stats</a>
            <a href="#gallery">Media</a>
        </div>
    </nav>

    <section id="home">
        <img src="SYNAPTICS.png" alt="SYNAPTICS" class="fest-logo">
        <h2 style="font-family:'Space Grotesk'; letter-spacing:15px; margin-top:25px; font-weight:300;">2K26</h2>
    </section>

    <section id="metrics" class="section">
        <div class="metrics-grid">
            <div class="metric-card reveal">
                <span class="metric-num" data-val="25">0</span>
                <span class="metric-label">Premium Events</span>
            </div>
            <div class="metric-card reveal">
                <span class="metric-num" data-val="1500">0</span>
                <span class="metric-label">Participants</span>
            </div>
            <div class="metric-card reveal">
                <span class="metric-num" data-val="20">0</span>
                <span class="metric-label">Projects @ Expo</span>
            </div>
            <div class="metric-card reveal">
                <span class="metric-num" data-val="12">0</span>
                <span class="metric-label">Innovation Awards</span>
            </div>
        </div>
    </section>

    <section id="gallery" class="section">
        <h2 style="font-family:'Space Grotesk'; border-left: 4px solid var(--accent); padding-left: 20px; margin-bottom: 50px; text-transform: uppercase;">Media Hub</h2>
        
        <div class="gallery-wrapper">
            <div class="media-box reveal">
                <div class="vid-indicator">Video</div>
                <video muted loop playsinline onmouseover="this.play()" onmouseout="this.pause()">
                    <source src="vid1.mp4" type="video/mp4">
                </video>
            </div>

            <div class="media-box reveal">
                <img src="flashmob.jpeg" alt="Flashmob">
            </div>

            <div class="media-box reveal">
                <img src="goldenboys.jpeg" alt="Team">
            </div>

            <div class="media-box reveal">
                <div class="vid-indicator">Video</div>
                <video muted loop playsinline onmouseover="this.play()" onmouseout="this.pause()">
                    <source src="vid2.mp4" type="video/mp4">
                </video>
            </div>

            <div class="media-box reveal">
                <img src="goldenmob.jpeg" alt="Crowd">
            </div>

            <div class="media-box reveal">
                <div class="vid-indicator">Video</div>
                <video muted loop playsinline onmouseover="this.play()" onmouseout="this.pause()">
                    <source src="vid3.mp4" type="video/mp4">
                </video>
            </div>

            <div class="media-box reveal">
                <img src="stage.jpeg" alt="Stage">
            </div>
        </div>
    </section>

    <footer>
        <div class="status-pill"><div class="dot"></div> REGISTRATION OPENING SOON</div>
        <p style="color:var(--text-mid); font-size:0.7rem; margin-top:30px;">© 2026 SYNAPTICS | ECE DEPT JNTUH UCES</p>
    </footer>

    <script>
        // --- STAR-SPARK CURSOR ENGINE ---
        const cursorCanvas = document.getElementById('cursor-canvas');
        const cctx = cursorCanvas.getContext('2d');
        let particles = [];

        function resize() {
            cursorCanvas.width = window.innerWidth;
            cursorCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.color = `rgba(0, 229, 255, ${Math.random()})`;
                this.life = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02;
            }
            draw() {
                cctx.fillStyle = this.color;
                cctx.globalAlpha = this.life;
                cctx.beginPath();
                cctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                cctx.fill();
            }
        }

        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<3; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        function animateParticles() {
            cctx.clearRect(0,0, cursorCanvas.width, cursorCanvas.height);
            for(let i=0; i<particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if(particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- BACKGROUND STARS ---
        const bgCanvas = document.getElementById('bg-canvas');
        const bctx = bgCanvas.getContext('2d');
        let stars = [];
        function initStars() {
            bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
            stars = Array.from({length: 100}, () => ({ x: Math.random()*bgCanvas.width, y: Math.random()*bgCanvas.height, size: Math.random()*1.5, speed: Math.random()*0.05 + 0.02 }));
        }
        function drawStars() {
            bctx.clearRect(0,0, bgCanvas.width, bgCanvas.height); bctx.fillStyle = "white";
            stars.forEach(s => { s.y -= s.speed; if(s.y<0) s.y=bgCanvas.height; bctx.beginPath(); bctx.arc(s.x, s.y, s.size, 0, Math.PI*2); bctx.fill(); });
            requestAnimationFrame(drawStars);
        }
        initStars(); drawStars();

        // --- SCROLL REVEAL & COUNTERS ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    e.target.classList.add('active');
                    if(e.target.classList.contains('metrics-grid')) startCounters();
                }
            });
        }, { threshold: 0.1 });

        function startCounters() {
            document.querySelectorAll('.metric-num').forEach(num => {
                if(num.innerText !== "0") return;
                const target = +num.getAttribute('data-val');
                let count = 0;
                const update = () => {
                    const inc = target / 40;
                    if(count < target) {
                        count += inc;
                        num.innerText = Math.ceil(count) + "+";
                        setTimeout(update, 30);
                    } else num.innerText = target + "+";
                };
                update();
            });
        }

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        observer.observe(document.querySelector('.metrics-grid'));
    </script>
</body>
</html>
